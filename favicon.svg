<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 기도하는 손 아이콘 - GREEN -->
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#16a34a;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#15803d;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 배경 원 -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)"/>
  
  <!-- 기도하는 손 -->
  <g fill="white" transform="translate(50, 50)">
    <!-- 왼손 -->
    <path d="M-15,-10 Q-20,-15 -18,-20 Q-16,-25 -12,-23 L-8,-10 Z"/>
    <!-- 오른손 -->
    <path d="M15,-10 Q20,-15 18,-20 Q16,-25 12,-23 L8,-10 Z"/>
    <!-- 손바닥 -->
    <ellipse cx="0" cy="0" rx="18" ry="12" opacity="0.9"/>
    <!-- 십자가 -->
    <rect x="-1.5" y="-18" width="3" height="12" opacity="0.8"/>
    <rect x="-5" y="-13" width="10" height="3" opacity="0.8"/>
  </g>
</svg>
